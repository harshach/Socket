name: macOS Build, Sign, Notarize & Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-sign-notarize:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version info
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          SHORT_VERSION="${VERSION#v}"
          BUILD_NUMBER=$(grep 'CURRENT_PROJECT_VERSION' Socket.xcodeproj/project.pbxproj \
            | head -n1 | grep -oE '[0-9]+' | tail -n1)
          {
            echo "VERSION=$VERSION"
            echo "SHORT_VERSION=$SHORT_VERSION"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
          } >> "$GITHUB_ENV"
          echo "Building version $SHORT_VERSION (build $BUILD_NUMBER)"

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          printf "%s" "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > signing_certificate.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import signing_certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -n1 | awk '{print $2}')
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using signing identity: $IDENTITY"

      - name: Build app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          mkdir -p build
          ENTITLEMENTS="$(pwd)/Socket/Socket.entitlements"
          echo "Attempting universal build (arm64 + x86_64)..."
          if ! xcodebuild -scheme Socket -configuration Release \
            -arch arm64 -arch x86_64 \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_ENTITLEMENTS="$ENTITLEMENTS" \
            PROVISIONING_PROFILE_SPECIFIER=""; then
            echo "Universal build failed, retrying Apple Silicon only..."
            xcodebuild -scheme Socket -configuration Release \
              -arch arm64 \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
              CODE_SIGN_STYLE=Manual \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_ENTITLEMENTS="$ENTITLEMENTS" \
              PROVISIONING_PROFILE_SPECIFIER=""
          fi
          cp -R "build/Build/Products/Release/Socket.app" ./Socket.app

      - name: Re-sign for notarization
        run: |
          # Notarization requires all binaries to be signed with our Developer ID,
          # a secure timestamp, and hardened runtime. Sparkle ships pre-signed with
          # its own cert, so we must re-sign the entire bundle from inside out.
          SPARKLE="Socket.app/Contents/Frameworks/Sparkle.framework/Versions/B"

          for bin in \
            "$SPARKLE/XPCServices/Downloader.xpc/Contents/MacOS/Downloader" \
            "$SPARKLE/XPCServices/Installer.xpc/Contents/MacOS/Installer" \
            "$SPARKLE/Updater.app/Contents/MacOS/Updater" \
            "$SPARKLE/Autoupdate"; do
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$bin"
          done
          for bundle in \
            "$SPARKLE/XPCServices/Downloader.xpc" \
            "$SPARKLE/XPCServices/Installer.xpc" \
            "$SPARKLE/Updater.app"; do
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$bundle"
          done
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp "$SPARKLE/Sparkle"

          # Sign the framework version (Versions/B) — do NOT also sign the
          # top-level Sparkle.framework symlink; it resolves to the same Versions/B
          # directory and double-signing would invalidate the signature.
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$SPARKLE"

          codesign --force --sign "$SIGNING_IDENTITY" --timestamp \
            --options runtime \
            --entitlements "$(pwd)/Socket/Socket.entitlements" \
            "Socket.app"

      - name: Verify signature before notarizing
        run: codesign --verify --deep --strict --verbose=2 "Socket.app"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "socket-notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

          # ditto preserves macOS symlinks and extended attributes; zip -r does not.
          # Broken symlinks in the archive cause "invalid signature" errors because
          # the bundle seal references symlink targets, not file copies.
          ditto -c -k --keepParent "Socket.app" Socket.zip
          SUBMIT_OUTPUT=$(xcrun notarytool submit "Socket.zip" \
            --keychain-profile "socket-notary" \
            --wait 2>&1)
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "^  id:" | head -1 | awk '{print $2}')
          STATUS=$(echo "$SUBMIT_OUTPUT" | grep "^  status:" | awk '{print $2}')
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization rejected. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" --keychain-profile "socket-notary"
            exit 1
          fi

      - name: Staple notarization ticket
        run: xcrun stapler staple "Socket.app"

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 "Socket.app"
          spctl --assess --type execute --verbose "Socket.app"

      - name: Create DMG
        run: |
          DMG_NAME="Socket-${VERSION}.dmg"
          hdiutil create -volname "Socket $SHORT_VERSION" \
            -srcfolder "Socket.app" \
            -ov -format UDZO "${DMG_NAME}"
          SIZE=$(stat -f '%z' "${DMG_NAME}")
          {
            echo "DMG_NAME=$DMG_NAME"
            echo "DMG_SIZE=$SIZE"
          } >> "$GITHUB_ENV"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: Socket-*.dmg
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Same pattern as nightly.yml — stage assets off-tree so the gh-pages
      # checkout doesn't blow them away.
      - name: Stage appcast assets
        run: |
          mkdir -p /tmp/appcast-staging
          cp -R .github/gh-pages-seed /tmp/appcast-staging/seed
          cp .github/scripts/update-appcast.py /tmp/appcast-staging/

      - name: Update appcast on gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/${DMG_NAME}"
          PUBDATE=$(date -R)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            echo "Bootstrapping gh-pages branch…"
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          for f in appcast.xml appcast-nightly.xml index.html README.md; do
            if [ ! -f "$f" ]; then
              cp "/tmp/appcast-staging/seed/$f" "$f"
              echo "Seeded $f"
            fi
          done

          APPCAST_PATH=appcast.xml \
          APPCAST_TITLE="Version ${SHORT_VERSION}" \
          APPCAST_PUBDATE="${PUBDATE}" \
          APPCAST_DMG_URL="${DMG_URL}" \
          APPCAST_VERSION="${BUILD_NUMBER}" \
          APPCAST_SHORT_VERSION="${SHORT_VERSION}" \
          APPCAST_DMG_SIZE="${DMG_SIZE}" \
          APPCAST_RELEASE_NOTES="https://github.com/${{ github.repository }}/releases/tag/${VERSION}" \
          APPCAST_MAX_ITEMS=100 \
            python3 /tmp/appcast-staging/update-appcast.py

          git add appcast.xml appcast-nightly.xml index.html README.md
          if git diff --cached --quiet; then
            echo "No appcast changes to commit."
          else
            git commit -m "Release ${VERSION}"
            git push origin gh-pages
          fi
