name: Build Stable Release

# Previously "Build, Sign, Notarize & Release" — now ad-hoc signed + EdDSA
# to sidestep the Apple Developer Program requirement. See nightly.yml for
# the same pattern and `.github/scripts/generate-keys.py` for key setup.

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  SPARKLE_VERSION: "2.6.4"

jobs:
  build-release:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version info
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          SHORT_VERSION="${VERSION#v}"
          BUILD_NUMBER=$(grep 'CURRENT_PROJECT_VERSION' Socket.xcodeproj/project.pbxproj \
            | head -n1 | grep -oE '[0-9]+' | tail -n1)
          {
            echo "VERSION=$VERSION"
            echo "SHORT_VERSION=$SHORT_VERSION"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
          } >> "$GITHUB_ENV"
          echo "Building version $SHORT_VERSION (build $BUILD_NUMBER)"

      - name: Build app (ad-hoc signed)
        run: |
          set -e
          mkdir -p build
          # `-project Socket.xcodeproj` is required because the repo still
          # carries a stale `Nook.xcodeproj` from an earlier rename.
          echo "Attempting universal build (arm64 + x86_64)..."
          if ! xcodebuild -project Socket.xcodeproj \
            -scheme Socket -configuration Release \
            -arch arm64 -arch x86_64 \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""; then
            echo "Universal build failed, retrying Apple Silicon only..."
            xcodebuild -project Socket.xcodeproj \
              -scheme Socket -configuration Release \
              -arch arm64 \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGNING_REQUIRED=YES \
              CODE_SIGNING_ALLOWED=YES \
              DEVELOPMENT_TEAM="" \
              PROVISIONING_PROFILE_SPECIFIER=""
          fi
          cp -R "build/Build/Products/Release/Socket.app" ./Socket.app

      - name: Re-sign with launch-compatible entitlements
        run: |
          set -e
          # See nightly.yml for the rationale. xcodebuild ad-hoc signs with
          # com.apple.developer.* entitlements that AMFI rejects at launch
          # (POSIX 163). Strip them and re-sign; this is the same pattern
          # scripts/dev-launch.sh uses locally.
          APP="Socket.app"
          ENT_SRC="Socket/Socket.entitlements"
          ENT_TMP=$(mktemp)
          plutil -convert xml1 -o "$ENT_TMP" "$ENT_SRC"
          for key in \
            com.apple.developer.aps-environment \
            com.apple.developer.authentication-services.autofill-credential-provider \
            com.apple.developer.web-browser.public-key-credential; do
            /usr/libexec/PlistBuddy -c "Delete :$key" "$ENT_TMP" 2>/dev/null || true
          done
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.disable-library-validation bool true" "$ENT_TMP" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :com.apple.security.cs.disable-library-validation true" "$ENT_TMP"

          while IFS= read -r -d '' nested; do
            codesign --force --sign - --timestamp=none "$nested" 2>/dev/null || true
          done < <(find "$APP" \
            \( -name "*.dylib" -o -name "*.framework" -o -name "*.xpc" -o -name "*.bundle" -o -name "*.app" \) \
            ! -path "$APP" \
            -print0)

          codesign --force --sign - --entitlements "$ENT_TMP" "$APP"
          rm -f "$ENT_TMP"
          codesign -dv --verbose=2 "$APP" 2>&1 | grep -E "Identifier|Signature|flags" || true

      - name: Create DMG
        run: |
          DMG_NAME="Socket-${VERSION}.dmg"
          hdiutil create -volname "Socket $SHORT_VERSION" \
            -srcfolder "Socket.app" \
            -ov -format UDZO "${DMG_NAME}"
          SIZE=$(stat -f '%z' "${DMG_NAME}")
          {
            echo "DMG_NAME=$DMG_NAME"
            echo "DMG_SIZE=$SIZE"
          } >> "$GITHUB_ENV"

      - name: Install Sparkle sign_update
        run: |
          curl -sSL \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle
          echo "SPARKLE_BIN=/tmp/sparkle/bin" >> "$GITHUB_ENV"

      - name: Sign DMG with EdDSA
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_ED_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY secret is not set — generate it with .github/scripts/generate-keys.py and add to repo secrets."
            exit 1
          fi
          KEY_FILE=$(mktemp)
          printf "%s" "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          trap 'rm -f "$KEY_FILE"' EXIT
          SIGN_OUTPUT=$("$SPARKLE_BIN/sign_update" -f "$KEY_FILE" "$DMG_NAME")
          echo "sign_update output: $SIGN_OUTPUT"
          ED_SIG=$(printf "%s" "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIG" ]; then
            echo "::error::Failed to parse sparkle:edSignature from sign_update output"
            exit 1
          fi
          echo "::add-mask::$ED_SIG"
          echo "APPCAST_ED_SIGNATURE=$ED_SIG" >> "$GITHUB_ENV"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: Socket-*.dmg
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage appcast assets
        run: |
          mkdir -p /tmp/appcast-staging
          cp -R .github/gh-pages-seed /tmp/appcast-staging/seed
          cp .github/scripts/update-appcast.py /tmp/appcast-staging/

      - name: Update appcast on gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/${DMG_NAME}"
          PUBDATE=$(date -R)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Isolated worktree — `git checkout gh-pages` in-place fails if the
          # build step left tracked files dirty (notably project.pbxproj from
          # add-test-target.rb), which previously aborted the whole appcast
          # update and left releases unlinked in the feed.
          WORKTREE=/tmp/gh-pages
          rm -rf "$WORKTREE"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages || git fetch origin gh-pages
            git worktree add "$WORKTREE" gh-pages
          else
            echo "Bootstrapping gh-pages branch…"
            git worktree add --orphan -b gh-pages "$WORKTREE"
            rm -rf "$WORKTREE"/* "$WORKTREE"/.[!.]*  2>/dev/null || true
          fi

          cd "$WORKTREE"

          for f in appcast.xml appcast-nightly.xml index.html README.md install.sh; do
            if [ ! -f "$f" ]; then
              cp "/tmp/appcast-staging/seed/$f" "$f"
              echo "Seeded $f"
            fi
          done

          APPCAST_PATH=appcast.xml \
          APPCAST_TITLE="Version ${SHORT_VERSION}" \
          APPCAST_PUBDATE="${PUBDATE}" \
          APPCAST_DMG_URL="${DMG_URL}" \
          APPCAST_VERSION="${BUILD_NUMBER}" \
          APPCAST_SHORT_VERSION="${SHORT_VERSION}" \
          APPCAST_DMG_SIZE="${DMG_SIZE}" \
          APPCAST_RELEASE_NOTES="https://github.com/${{ github.repository }}/releases/tag/${VERSION}" \
          APPCAST_MAX_ITEMS=100 \
            python3 /tmp/appcast-staging/update-appcast.py

          git add appcast.xml appcast-nightly.xml index.html README.md install.sh
          if git diff --cached --quiet; then
            echo "No appcast changes to commit."
          else
            git commit -m "Release ${VERSION}"
            git push origin gh-pages
          fi
