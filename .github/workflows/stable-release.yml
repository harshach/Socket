name: Weekly Stable Release

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at noon UTC
  workflow_dispatch:

jobs:
  check-and-release:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits since last release
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous release found, proceeding"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_version=v1.1.0" >> $GITHUB_OUTPUT
          else
            COMMITS_SINCE=$(git rev-list ${LAST_TAG}..HEAD --count)
            echo "Commits since $LAST_TAG: $COMMITS_SINCE"
            if [ "$COMMITS_SINCE" -gt 0 ]; then
              # Auto-increment patch version
              CURRENT=${LAST_TAG#v}
              MAJOR=$(echo $CURRENT | cut -d. -f1)
              MINOR=$(echo $CURRENT | cut -d. -f2)
              PATCH=$(echo $CURRENT | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "new_version=v${MAJOR}.${MINOR}.${NEW_PATCH}" >> $GITHUB_OUTPUT
            else
              echo "No new commits, skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create release tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.check.outputs.new_version }}"
          SHORT_VERSION="${VERSION#v}"
          BUILD_NUMBER=$(git rev-list --count HEAD)

          # Update version in project
          sed -i '' "s/MARKETING_VERSION = .*/MARKETING_VERSION = ${SHORT_VERSION};/" Socket.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};/" Socket.xcodeproj/project.pbxproj

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Socket.xcodeproj/project.pbxproj
          git commit -m "Bump version to ${SHORT_VERSION}" || true
          git tag "$VERSION"
          git push origin main --tags

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHORT_VERSION=$SHORT_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        run: |
          gh release create "$VERSION" \
            --title "Socket $SHORT_VERSION" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The macos-notarize.yml workflow triggers on release published
        # and handles the actual build, sign, notarize, DMG, and appcast update.
