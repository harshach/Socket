name: Nightly Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  nightly:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set nightly version info
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          DATE=$(date +%Y%m%d)
          SHORT_VERSION="1.1.0-nightly.${DATE}"
          BUILD_NUMBER="${COMMIT_COUNT}"
          echo "SHORT_VERSION=$SHORT_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "Building nightly: $SHORT_VERSION (build $BUILD_NUMBER)"

          # Update version in project
          sed -i '' "s/MARKETING_VERSION = .*/MARKETING_VERSION = ${SHORT_VERSION};/" Socket.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};/" Socket.xcodeproj/project.pbxproj

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          printf "%s" "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > signing_certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import signing_certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n1 | awk '{print $2}')
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV

      - name: Build app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          mkdir -p build
          ENTITLEMENTS="$(pwd)/Socket/Socket.entitlements"
          xcodebuild -scheme Socket -configuration Release \
            -arch arm64 -derivedDataPath build \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_ENTITLEMENTS="$ENTITLEMENTS" \
            PROVISIONING_PROFILE_SPECIFIER=""
          cp -R "build/Build/Products/Release/Socket.app" ./Socket.app

      - name: Re-sign for notarization
        run: |
          SPARKLE="Socket.app/Contents/Frameworks/Sparkle.framework/Versions/B"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$SPARKLE/XPCServices/Downloader.xpc/Contents/MacOS/Downloader"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$SPARKLE/XPCServices/Installer.xpc/Contents/MacOS/Installer"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$SPARKLE/Updater.app/Contents/MacOS/Updater"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$SPARKLE/Autoupdate"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$SPARKLE/XPCServices/Downloader.xpc"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$SPARKLE/XPCServices/Installer.xpc"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$SPARKLE/Updater.app"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp "$SPARKLE/Sparkle"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$SPARKLE"
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime --entitlements "$(pwd)/Socket/Socket.entitlements" "Socket.app"

      - name: Verify signature
        run: codesign --verify --deep --strict --verbose=2 "Socket.app"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "socket-notary" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          ditto -c -k --keepParent "Socket.app" Socket.zip
          SUBMIT_OUTPUT=$(xcrun notarytool submit "Socket.zip" --keychain-profile "socket-notary" --wait 2>&1)
          echo "$SUBMIT_OUTPUT"
          STATUS=$(echo "$SUBMIT_OUTPUT" | grep "^  status:" | awk '{print $2}')
          if [ "$STATUS" != "Accepted" ]; then
            SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "^  id:" | head -1 | awk '{print $2}')
            xcrun notarytool log "$SUBMISSION_ID" --keychain-profile "socket-notary"
            exit 1
          fi

      - name: Staple and verify
        run: |
          xcrun stapler staple "Socket.app"
          codesign --verify --deep --strict --verbose=2 "Socket.app"

      - name: Create DMG
        run: |
          hdiutil create -volname "Socket Nightly ${SHORT_VERSION}" \
            -srcfolder "Socket.app" -ov -format UDZO "Socket-nightly-${SHORT_VERSION}.dmg"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Socket-nightly-${{ env.SHORT_VERSION }}
          path: Socket-nightly-*.dmg

      - name: Update nightly appcast
        run: |
          DMG_NAME="Socket-nightly-${SHORT_VERSION}.dmg"
          # Upload DMG to a nightly pre-release
          gh release create "nightly-${SHORT_VERSION}" "${DMG_NAME}" \
            --title "Nightly ${SHORT_VERSION}" \
            --prerelease --notes "Automated nightly build from main branch" \
            || gh release upload "nightly-${SHORT_VERSION}" "${DMG_NAME}" --clobber
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/nightly-${SHORT_VERSION}/${DMG_NAME}"
          DATE=$(date -R)

          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          # Create appcast-nightly.xml if it doesn't exist
          if [ ! -f appcast-nightly.xml ]; then
            cat > appcast-nightly.xml << 'INITEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Socket Browser Nightly</title>
            </channel>
          </rss>
          INITEOF
          fi

          ENTRY=$(cat << XMLEOF
              <item>
                <title>Nightly ${SHORT_VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <enclosure
                  url="${DMG_URL}"
                  sparkle:version="${BUILD_NUMBER}"
                  sparkle:shortVersionString="${SHORT_VERSION}"
                  type="application/octet-stream"/>
              </item>
          XMLEOF
          )

          python3 -c "
          import sys
          content = open('appcast-nightly.xml').read()
          entry = sys.argv[1]
          content = content.replace('</channel>', entry + '\n  </channel>', 1)
          open('appcast-nightly.xml', 'w').write(content)
          " "$ENTRY"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast-nightly.xml
          git commit -m "Nightly ${SHORT_VERSION}" || true
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
