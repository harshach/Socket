name: Nightly Build

# No Apple Developer Program required — we ad-hoc sign the binary and use
# Sparkle's EdDSA signatures for update integrity. Users see a one-time
# Gatekeeper prompt on first install but auto-updates are cryptographically
# verified. See `.github/gh-pages-seed/README.md` for user-facing bypass
# instructions and `.github/scripts/generate-keys.py` for key generation.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nightly-build
  cancel-in-progress: false

env:
  # Pin Sparkle release for the sign_update tool. Keep in sync with whatever
  # version SPM resolves in Package.resolved.
  SPARKLE_VERSION: "2.6.4"

jobs:
  nightly:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set nightly version info
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +%Y%m%d)
          SHORT_VERSION="1.1.0-nightly.${DATE}.${COMMIT_COUNT}+${SHORT_SHA}"
          BUILD_NUMBER="${COMMIT_COUNT}"
          RELEASE_TAG="nightly-${DATE}-${COMMIT_COUNT}"
          DMG_NAME="Socket-nightly-${DATE}-${COMMIT_COUNT}.dmg"
          {
            echo "SHORT_VERSION=$SHORT_VERSION"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "DMG_NAME=$DMG_NAME"
          } >> "$GITHUB_ENV"
          echo "Building nightly: $SHORT_VERSION (tag $RELEASE_TAG)"

          sed -i '' "s/MARKETING_VERSION = .*/MARKETING_VERSION = ${SHORT_VERSION};/" \
            Socket.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};/" \
            Socket.xcodeproj/project.pbxproj

      - name: Build app (ad-hoc signed)
        run: |
          set -e
          mkdir -p build
          # Ad-hoc signing (-) means the app has a valid code signature with
          # no team identity. Apple Silicon won't launch completely unsigned
          # binaries; ad-hoc is the minimum viable signature.
          xcodebuild -scheme Socket -configuration Release \
            -arch arm64 -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
          cp -R "build/Build/Products/Release/Socket.app" ./Socket.app

      - name: Create DMG
        run: |
          hdiutil create -volname "Socket Nightly ${SHORT_VERSION}" \
            -srcfolder "Socket.app" -ov -format UDZO "${DMG_NAME}"
          SIZE=$(stat -f '%z' "${DMG_NAME}")
          echo "DMG_SIZE=$SIZE" >> "$GITHUB_ENV"

      - name: Install Sparkle sign_update
        run: |
          curl -sSL \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle
          # Release archive lays things out as `bin/sign_update` at the root.
          ls /tmp/sparkle/bin/
          echo "SPARKLE_BIN=/tmp/sparkle/bin" >> "$GITHUB_ENV"

      - name: Sign DMG with EdDSA
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_ED_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY secret is not set — generate it with .github/scripts/generate-keys.py and add to repo secrets."
            exit 1
          fi
          # sign_update takes the private key file via -f. Use a mktemp so we
          # don't accidentally write the key somewhere it gets archived.
          KEY_FILE=$(mktemp)
          printf "%s" "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          trap 'rm -f "$KEY_FILE"' EXIT
          # Output is like: sparkle:edSignature="AbCd..." length="12345678"
          SIGN_OUTPUT=$("$SPARKLE_BIN/sign_update" -f "$KEY_FILE" "$DMG_NAME")
          echo "sign_update output: $SIGN_OUTPUT"
          ED_SIG=$(printf "%s" "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIG" ]; then
            echo "::error::Failed to parse sparkle:edSignature from sign_update output"
            exit 1
          fi
          echo "::add-mask::$ED_SIG"
          echo "APPCAST_ED_SIGNATURE=$ED_SIG" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_TAG }}
          path: ${{ env.DMG_NAME }}

      - name: Stage appcast assets
        run: |
          mkdir -p /tmp/appcast-staging
          cp "${DMG_NAME}" "/tmp/appcast-staging/${DMG_NAME}"
          cp -R .github/gh-pages-seed /tmp/appcast-staging/seed
          cp .github/scripts/update-appcast.py /tmp/appcast-staging/

      - name: Publish pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${DMG_NAME}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${DMG_NAME}" \
              --title "Nightly ${SHORT_VERSION}" \
              --prerelease \
              --notes "Automated nightly build from main (commit ${{ github.sha }}). Unsigned — right-click → Open on first launch."
          fi
          echo "DMG_URL=https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${DMG_NAME}" >> "$GITHUB_ENV"

      - name: Update nightly appcast on gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout gh-pages
          else
            echo "Bootstrapping gh-pages branch…"
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          for f in appcast.xml appcast-nightly.xml index.html README.md; do
            if [ ! -f "$f" ]; then
              cp "/tmp/appcast-staging/seed/$f" "$f"
              echo "Seeded $f"
            fi
          done

          PUBDATE=$(date -R)
          APPCAST_PATH=appcast-nightly.xml \
          APPCAST_TITLE="Nightly ${SHORT_VERSION}" \
          APPCAST_PUBDATE="${PUBDATE}" \
          APPCAST_DMG_URL="${DMG_URL}" \
          APPCAST_VERSION="${BUILD_NUMBER}" \
          APPCAST_SHORT_VERSION="${SHORT_VERSION}" \
          APPCAST_DMG_SIZE="${DMG_SIZE}" \
          APPCAST_MAX_ITEMS=30 \
            python3 /tmp/appcast-staging/update-appcast.py

          git add appcast.xml appcast-nightly.xml index.html README.md
          if git diff --cached --quiet; then
            echo "No appcast changes to commit."
          else
            git commit -m "Nightly ${SHORT_VERSION}"
            git push origin gh-pages
          fi
